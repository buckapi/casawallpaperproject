<section class="cw-admin-login">
  <div class="cw-admin-card">
    <img src="assets/img/logo/header-logo.png" alt="Casa Wallpaper" />

    <h1>Admin Access</h1>
    <p>Sign in to manage your dashboard.</p>

    <form (ngSubmit)="login()">
      <label>
        Email
        <input style="color: #000;" type="email" [(ngModel)]="email" name="email" required />
      </label>

      <label>
        Password
        <input style="color: #000;" type="password" [(ngModel)]="password" name="password" required />
      </label>

      <div class="cw-login-error" *ngIf="error">
        {{ error }}
      </div>

      <button type="submit">
        Sign In
        <i class="fa-solid fa-arrow-right"></i>
      </button>
    </form>

    <a routerLink="/home">Back to website</a>
  </div>
</section>
